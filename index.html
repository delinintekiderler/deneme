<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beni Seviyor Musun?</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #ffe6eb;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        h1 {
            color: #ff477e;
            margin-bottom: 40px;
            font-size: 2.5rem;
        }

        .buttons {
            display: flex;
            justify-content: center;
            gap: 30px;
            position: relative;
        }

        button {
            padding: 15px 40px;
            font-size: 1.2rem;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        #evet {
            background-color: #ff477e;
            color: white;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.4);
        }

        #evet:hover {
            background-color: #ff2a66;
            transform: scale(1.05);
        }

        #hayir {
            background-color: #ccc;
            color: #333;
            position: relative;
        }

        #cevap {
            margin-top: 30px;
            font-size: 2rem;
            color: #ff477e;
            font-weight: bold;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Beni Seviyor musun?</h1>
        <div class="buttons">
            <button id="evet" onclick="cevapEvet()">Evet</button>
            <button id="hayir" onmouseover="hareketEt()">Hayır</button>
        </div>
        <div id="cevap">Seni çok seviyorum! ❤️</div>
    </div>

    <script>
        function cevapEvet() {
            document.getElementById('cevap').style.display = 'block';
        }

        function hareketEt() {
            var hayirBtn = document.getElementById('hayir');
            
            // Butonun rastgele ekranda kaçacağı koordinatları hesaplar
            var x = Math.random() * (window.innerWidth - 150);
            var y = Math.random() * (window.innerHeight - 100);
            
            hayirBtn.style.position = 'absolute';
            hayirBtn.style.left = x + 'px';
            hayirBtn.style.top = y + 'px';
        }
    </script>
</body>
</html>
